<script>

const COLORS = { green:'#3fb950', red:'#f85149', ma60:'#79c0ff', bb:'rgba(88,166,255,0.15)', bbBorder:'rgba(88,166,255,0.3)', volumeUp:'rgba(63,185,80,0.5)', volumeDown:'rgba(248,81,73,0.5)', macd:'#6c5ce7', signal:'#ffa657', histUp:'#3fb950', histDown:'#f85149', rsiLine:'#f0e68c' };

function fmt(n) {
  if (n === null || n === undefined || n === '-') return '-';
  const v = parseFloat(String(n).replace(/,/g,''));
  return isNaN(v) ? n : v.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

async function fetchTWSE(url) {
  const resp = await fetch(url);
  const json = await resp.json();
  if (json.stat !== 'OK') throw new Error(json.errcode || json.stat || 'API錯誤');
  return json;
}

async function loadStock() {
  const code = document.getElementById('stockInput').value.trim();
  if (!code || code.length < 4) { alert('請輸入股票代碼（如 2330）'); return; }
  console.log('🔍 Loading stock:', code);
  document.getElementById('statusMsg').innerHTML = "🔄 載入中...<br><span style='font-size:12px;color:var(--text2);'>正在從 TWSE 抓取資料，請稍候</span>";
  document.getElementById('analysis').style.display = 'none';
  document.getElementById('stockInfo').style.display = 'none';
  
  try {
    // Fetch historical data (last 6 months)
    const now = new Date();
    let allDays = [];
    for (let m = 0; m < 6; m++) {
      const d = new Date(now.getFullYear(), now.getMonth() - m, 1);
      const y = d.getFullYear(); const mon = String(d.getMonth()+1).padStart(2,'0');
      try {
        const dayData = await fetchTWSE(`https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${y}${mon}01&stockNo=${code}`);
        allDays = [...dayData.data, ...allDays];
      } catch(e) { /* month might be empty */ }
    }
    
    if (allDays.length === 0) throw new Error('無資料');
    
    // Parse TWSE date format (113/01/02 → 2024/01/02)
    function twDate(t) {
      const parts = t.split('/');
      const y = parseInt(parts[0]) + 1911;
      return new Date(`${y}/${parts[1]}/${parts[2]}`).getTime();
    }
    
    // Parse data - TWSE format: [date, volume, amount, open, high, low, close, change, transCount]
    const parsed = allDays.map(r => ({
      t: twDate(r[0]), vol: parseInt(r[1].replace(/,/g,'')), amount: parseFloat(r[2].replace(/,/g,'')),
      o: parseFloat(r[3].replace(/,/g,'')), h: parseFloat(r[4].replace(/,/g,'')),
      l: parseFloat(r[5].replace(/,/g,'')), c: parseFloat(r[6].replace(/,/g,''))
    })).filter(d => d.c > 0).sort((a,b) => a.t - b.t);
    
    allData = parsed;
    
    // Today's info from latest data
    const last = parsed[parsed.length-1];
    const prev = parsed.length > 1 ? parsed[parsed.length-2] : null;
    const change = prev ? last.c - prev.c : 0;
    const pct = prev && prev.c > 0 ? (change/prev.c*100) : 0;
    
    document.getElementById('stockInfo').innerHTML = `
      <div style="display:flex;align-items:baseline;gap:8px;">
        <h2>${code}</h2>
        <span style="color:var(--text2);font-size:14px;" id="stockName">...</span>
      </div>
      <div>
        <span class="price ${change>=0?'positive':'negative'}">${fmt(last.c)}</span>
        <span class="change ${change>=0?'positive':'negative'}">${change>=0?'+':''}${fmt(change)} (${pct>=0?'+':''}${pct.toFixed(2)}%)</span>
        <span style="color:var(--text2);font-size:14px;margin-left:16px;">高 ${fmt(last.h)} 低 ${fmt(last.l)} 開 ${fmt(last.o)}</span>
        <span style="color:var(--text2);font-size:14px;margin-left:16px;">量 ${fmt(last.vol)} 張</span>
      </div>
    `;
    document.getElementById('stockInfo').style.display = 'block';
    
    // Get stock name from close
    document.getElementById('stockName').textContent = await getStockName(code);
    
    // Render charts
    renderAnalysisText(parsed, code);
    document.getElementById("plotlyChart").src = "charts/" + code + ".html";
    document.getElementById("chartDate").textContent = "更新: " + new Date().toLocaleDateString("zh-TW") + " | " + code;
    // Charts removed - using plotly iframe
    // Charts removed - using plotly iframe
    // Charts removed - using plotly iframe
    // Charts removed - using plotly iframe
    renderOwnership(parsed, last);
    loadInstitutional(code);
    
    document.getElementById('analysis').style.display = 'block';
    document.getElementById('statusMsg').style.display = 'none';
    
  } catch(e) {
    document.getElementById('statusMsg').textContent = `⚠️ ${e.message}`;
  }
}

async function getStockName(code) {
  try {
    // Try from embedded name lookup
    const resp = await fetch(`https://www.twse.com.tw/exchangeReport/STOCK_DAY_ALL?response=json&date=${new Date().toISOString().slice(0,10).replace(/-/g,'')}`);
    const json = await resp.json();
    if (json.stat === 'OK') {
      const found = json.data.find(r => r[0] === code);
      if (found) return found[1];
    }
  } catch(_) {}
  return '';
}

function calcSMA(data, period) {
  const result = [];
  for (let i = 0; i < data.length; i++) {
    if (i < period-1) { result.push(null); continue; }
    let sum = 0;
    for (let j = 0; j < period; j++) sum += data[i-j];
    result.push(sum/period);
  }
  return result;
}

function calcBB(data, period, mult) {
  const ma = calcSMA(data, period);
  const upper = [], lower = [], mid = [];
  for (let i = 0; i < data.length; i++) {
    if (ma[i] === null) { upper.push(null); lower.push(null); mid.push(null); continue; }
    let sumSq = 0;
    const start = Math.max(0, i-period+1);
    for (let j = start; j <= i; j++) sumSq += (data[j] - ma[i]) ** 2;
    const sd = Math.sqrt(sumSq / (i-start+1));
    upper.push(ma[i] + mult * sd);
    lower.push(ma[i] - mult * sd);
    mid.push(ma[i]);
  }
  return { upper, lower, mid };
}

function calcMACD(data, fast, slow, sig) {
  function ema(arr, period) {
    const result = [arr[0]];
    const k = 2/(period+1);
    for (let i = 1; i < arr.length; i++) result.push(arr[i]*k + result[i-1]*(1-k));
    return result;
  }
  const emaFast = ema(data, fast);
  const emaSlow = ema(data, slow);
  const macdLine = emaFast.map((v,i) => v - emaSlow[i]);
  const signalLine = ema(macdLine, sig);
  const hist = macdLine.map((v,i) => v - signalLine[i]);
  return { macdLine, signalLine, hist };
}

function calcRSI2(data, period) {
  const result = [null];
  for (let i = 1; i < data.length; i++) {
    if (i < period) { result.push(null); continue; }
    let gain = 0, loss = 0;
    for (let j = 0; j < period; j++) {
      const diff = data[i-j] - data[i-j-1];
      if (diff > 0) gain += diff; else loss -= diff;
    }
    const avgG = gain/period, avgL = loss/period;
    const rs = avgL === 0 ? 999 : avgG/avgL;
    result.push(100 - 100/(1+rs));
  }
  return result;
}

function renderAnalysisText(data, code) {
  if (data.length === 0) return;
  const last = data[data.length-1];
  const prev = data.length > 1 ? data[data.length-2] : null;
  const change = prev ? last.c - prev.c : 0;
  const pct = prev && prev.c > 0 ? (change/prev.c*100) : 0;
  const closes = data.map(d => d.c);
  const highs = data.map(d => d.h);
  const lows = data.map(d => d.l);
  const vols = data.map(d => d.vol);
  
  // Basic stats
  const avgVol = vols.slice(-20).reduce((s,v) => s+v, 0) / Math.min(20, vols.length);
  const high20 = Math.max(...highs.slice(-20));
  const low20 = Math.min(...lows.slice(-20));
  const range20 = ((high20 - low20) / low20 * 100);
  
  // MA60
  const sma60 = calcSMA(closes, 60);
  const ma60 = sma60[sma60.length-1];
  const ma60Div = ma60 !== null ? ((last.c - ma60) / ma60 * 100) : null;
  
  // BB
  const bb = calcBB(closes, 20, 2);
  const bbUpper = bb.upper[bb.upper.length-1];
  const bbLower = bb.lower[bb.lower.length-1];
  const bbMid = bb.mid[bb.mid.length-1];
  const bbPos = bbMid ? ((last.c - bbMid) / (bbUpper - bbMid) * 100) : null;
  
  // RSI
  const rsi = calcRSI2(closes, 14);
  const rsiVal = rsi[rsi.length-1];
  
  // MACD
  const macd = calcMACD(closes, 12, 26, 9);
  const lastMacd = macd.macdLine[macd.macdLine.length-1];
  const lastSig = macd.signalLine[macd.signalLine.length-1];
  const lastHist = macd.hist[macd.hist.length-1];
  
  // Volume
  const vol5Avg = vols.slice(-5).reduce((s,v) => s+v, 0) / Math.min(5, vols.length);
  const volRatio = avgVol > 0 ? (last.vol / vol5Avg) : 0;
  
  const dirIcon = change >= 0 ? '📈' : '📉';
  const rsiStatus = rsiVal > 70 ? '超買 🟠' : rsiVal < 30 ? '超賣 🟢' : '中性 ⚪';
  const macdStatus = lastMacd > lastSig ? '多頭 🟢' : '空頭 🔴';
  const bbStatus = bbPos > 80 ? '上緣 🟠' : bbPos < 20 ? '下緣 🟢' : '中段 ⚪';
  const maStatus = ma60Div > 5 ? '乖離過大 🟠' : ma60Div < -5 ? '乖離過大 🟢' : '正常 ⚪';
  
  // Trend estimate
  const trend5 = closes.slice(-5);
  const trendDir = trend5.length >= 5 && trend5[trend5.length-1] > trend5[0] ? '短線偏多 ↗️' :
                   trend5.length >= 5 && trend5[trend5.length-1] < trend5[0] ? '短線偏空 ↘️' : '短線盤整 ↔️';
  
  let html = `<table style="width:100%;border-collapse:collapse;font-size:14px;">
    <tr>
      <td style="padding:4px 12px;border:1px solid #eee;"><b>${dirIcon} 收盤</b></td>
      <td style="padding:4px 12px;border:1px solid #eee;font-weight:700;color:${change>=0?'var(--red)':'var(--green)'}">${last.c.toLocaleString()} ${change>=0?'+':''}${change.toFixed(2)} (${pct>=0?'+':''}${pct.toFixed(2)}%)</td>
      <td style="padding:4px 12px;border:1px solid #eee;"><b>📊 近20日區間</b></td>
      <td style="padding:4px 12px;border:1px solid #eee;">高 ${high20.toLocaleString()} / 低 ${low20.toLocaleString()} / 幅 ${range20.toFixed(1)}%</td>
    </tr>
    <tr>
      <td style="padding:4px 12px;border:1px solid #eee;"><b>📐 MA60</b></td>
      <td style="padding:4px 12px;border:1px solid #eee;">${ma60 !== null ? ma60.toLocaleString() : '-'} (乖離 ${ma60Div !== null ? ma60Div.toFixed(2)+'%' : '-'}) ${maStatus}</td>
      <td style="padding:4px 12px;border:1px solid #eee;"><b>🔵 布林通道</b></td>
      <td style="padding:4px 12px;border:1px solid #eee;">上 ${bbUpper.toLocaleString()} / 中 ${bbMid.toLocaleString()} / 下 ${bbLower.toLocaleString()} ${bbStatus}</td>
    </tr>
    <tr>
      <td style="padding:4px 12px;border:1px solid #eee;"><b>📈 RSI(14)</b></td>
      <td style="padding:4px 12px;border:1px solid #eee;">${rsiVal !== null ? rsiVal.toFixed(1) : '-'} ${rsiStatus}</td>
      <td style="padding:4px 12px;border:1px solid #eee;"><b>⚡ MACD</b></td>
      <td style="padding:4px 12px;border:1px solid #eee;">DIF ${lastMacd.toFixed(1)} / 信號線 ${lastSig.toFixed(1)} / 柱 ${lastHist.toFixed(1)} ${macdStatus}</td>
    </tr>
    <tr>
      <td style="padding:4px 12px;border:1px solid #eee;"><b>📊 今日成交量</b></td>
      <td style="padding:4px 12px;border:1px solid #eee;">${last.vol.toLocaleString()} 張 ${volRatio > 1.5 ? '🔥放量' : volRatio > 1.0 ? '正常' : '量縮'}</td>
      <td style="padding:4px 12px;border:1px solid #eee;"><b>🔍 趨勢</b></td>
      <td style="padding:4px 12px;border:1px solid #eee;">${trendDir} ${ma60Div !== null ? (last.c > ma60 ? '｜在季線上' : '｜在季線下') : ''}</td>
    </tr>
  </table>`;
  
  document.getElementById('analysisSummary').innerHTML = html;
  document.getElementById('analysisText').style.display = 'block';
}

function renderMainChart(data) {
  const closes = data.map(d => d.c);
  const sma60 = calcSMA(closes, 60);
  const bb = calcBB(closes, 20, 2);
  const labels = data.map(d => d.t);
  
  const ctx = document.getElementById('mainChart');
  if (mainChart) mainChart.destroy();
  
  // Check if candlestick controller is available
  const canCandlestick = typeof Chart.registry === 'object' && Chart.registry.getController && (() => { try { Chart.registry.getController('candlestick'); return true; } catch(e) { return false; } })();
  
  if (!canCandlestick) {
    console.warn('Candlestick controller not available, falling back to line');
    mainChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: '收盤價',
          data: closes,
          borderColor: '#58a6ff', borderWidth: 2, pointRadius: 0, fill: false
        }, {
          label: 'MA60',
          data: sma60,
          borderColor: '#79c0ff', borderWidth: 1.5, pointRadius: 0, borderDash: [5,5], fill: false
        }, {
          label: 'BB上軌',
          data: bb.upper,
          borderColor: 'rgba(88,166,255,0.3)', borderWidth: 1, pointRadius: 0, fill: false
        }, {
          label: 'BB下軌',
          data: bb.lower,
          borderColor: 'rgba(88,166,255,0.3)', borderWidth: 1, pointRadius: 0, fill: '-', backgroundColor: 'rgba(88,166,255,0.08)'
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { x: { type: 'linear', ticks: { color:'#868e96', maxTicksLimit:10, callback:v=>{const d=new Date(v);return `${d.getMonth()+1}/${d.getDate()}`} }, grid:{color:'rgba(0,0,0,0.06)'} }, y: { position:'right', ticks:{color:'#868e96'}, grid:{color:'rgba(0,0,0,0.06)'} } }
      }
    });
    return;
  }
  
  mainChart = new Chart(ctx, {
    type: 'candlestick',
    data: {
      datasets: [{
        label: 'K線',
        data: data.map(d => ({ x: d.t, o: d.o, h: d.h, l: d.l, c: d.c })),
        color: { up: COLORS.red, down: COLORS.green, unchanged: '#888' },
        bar: { up: COLORS.red, down: COLORS.green }
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          mode: 'index', intersect: false,
          callbacks: {
            title: items => items.length ? new Date(items[0].parsed.x).toLocaleDateString('zh-TW') : ''
          }
        }
      },
      scales: {
        x: {
          type: 'linear',
          ticks: {
            color: '#868e96', maxTicksLimit: 10,
            callback: v => { const d = new Date(v); return `${d.getMonth()+1}/${d.getDate()}`; }
          },
          grid: { color: 'rgba(0,0,0,0.06)' }
        },
        y: {
          position: 'right',
          ticks: { color: '#868e96', callback: v => v.toLocaleString() },
          grid: { color: 'rgba(0,0,0,0.06)' }
        }
      }
    },
    plugins: [{
      id: 'ma60BB',
      afterDraw(chart) {
        const ctx2 = chart.ctx;
        const xAxis = chart.scales.x;
        const yAxis = chart.scales.y;
        const meta = chart.getDatasetMeta(0);
        const points = meta.data;
        
        // Filter out points outside chart area
        const visible = points.map((p, i) => ({ p, i })).filter(v => v.p && v.p.x >= xAxis.left && v.p.x <= xAxis.right);
        if (visible.length < 5) return;
        
        function drawLine(arr, color, w, dash) {
          ctx2.beginPath();
          ctx2.strokeStyle = color;
          ctx2.lineWidth = w || 1;
          ctx2.setLineDash(dash || []);
          let started = false;
          for (const { p, i } of visible) {
            const val = arr[i];
            if (val === null || val === undefined) { started = false; continue; }
            const y = yAxis.getPixelForValue(val);
            if (!started) { ctx2.moveTo(p.x, y); started = true; }
            else ctx2.lineTo(p.x, y);
          }
          ctx2.stroke();
          ctx2.setLineDash([]);
        }
        
        function drawBand(upper, lower, mid, color, fillColor) {
          if (!upper.length) return;
          ctx2.beginPath();
          let started = false;
          for (const { p, i } of visible) {
            const u = upper[i], lw = lower[i];
            if (u === null || lw === null) continue;
            if (!started) {
              ctx2.moveTo(p.x, yAxis.getPixelForValue(u));
              started = true;
            }
            ctx2.lineTo(p.x, yAxis.getPixelForValue(u));
          }
          // Backward for lower band
          const rev = [...visible].reverse();
          for (const { p, i } of rev) {
            const lw = lower[i];
            if (lw === null) continue;
            ctx2.lineTo(p.x, yAxis.getPixelForValue(lw));
          }
          ctx2.closePath();
          ctx2.fillStyle = fillColor || 'rgba(88,166,255,0.08)';
          ctx2.fill();
          
          // Middle line
          drawLine(mid, color || 'rgba(88,166,255,0.5)', 1, [5,5]);
        }
        
        // Bollinger Band
        drawBand(bb.upper, bb.lower, bb.mid, 'rgba(88,166,255,0.5)', 'rgba(88,166,255,0.08)');
        
        // MA60
        drawLine(sma60, COLORS.ma60, 2);
      }
    }]
  });
}

function renderOwnership(data, last) {
  const ctx = document.getElementById('ownershipChart');
  if (window._ownChart) window._ownChart.destroy();
  const ownEl = document.getElementById('ownershipLegend');
  
  // Use real T86 data if available
  const id = window._instTradingData;
  if (id && (id.foreignBuy + id.foreignSell + id.trustBuy + id.trustSell + id.dealerBuy + id.dealerSell) > 0) {
    const totalInstVol = id.foreignBuy + id.foreignSell + id.trustBuy + id.trustSell + id.dealerBuy + id.dealerSell;
    const totalVol = last.vol * 2; // total market both sides
    if (totalVol > 0) {
      const foreignPct = (id.foreignBuy + id.foreignSell) / totalVol;
      const trustPct = (id.trustBuy + id.trustSell) / totalVol;
      const dealerPct = (id.dealerBuy + id.dealerSell) / totalVol;
      const retailPct = Math.max(0, 1 - foreignPct - trustPct - dealerPct);
      const labels = ['外資', '投信', '自營商', '散戶'];
      const values = [foreignPct, trustPct, dealerPct, retailPct];
      const colors = ['#007bff', '#28a745', '#ffc107', '#6c757d'];
      
      window._ownChart = new Chart(ctx, {
        type: 'doughnut',
        data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 0 }] },
        options: {
          responsive: true, maintainAspectRatio: true,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => `${c.label}: ${(c.parsed * 100).toFixed(2)}%` } } }
        }
      });
      
      ownEl.innerHTML = values.map((v,i) => `<div><span class="dot" style="background:${colors[i]}"></span> ${labels[i]} ${(v*100).toFixed(2)}%</div>`).join('') +
        '<div style="font-size:11px;color:var(--text2);margin-top:8px;">📡 當日法人成交佔比（TWSE T86）</div>';
      return;
    }
  }
  
  ownEl.innerHTML = '<span style="color:var(--text2)">📡 三大法人資料更新中…</span>';
}

async function loadInstitutional(code) {
  document.getElementById('instLoader').style.display = 'block';
  document.getElementById('instTable').innerHTML = '';
  
  try {
    const now = new Date();
    const y = now.getFullYear(); const m = String(now.getMonth()+1).padStart(2,'0'); const d = String(now.getDate()).padStart(2,'0');
    
    // Try to get T86 data for individual stock institutional trading
    const data = await fetchTWSE(`https://www.twse.com.tw/fund/T86?response=json&date=${y}${m}${d}&selectType=ALL`);
    
    if (data.data && data.data.length > 0) {
      let html = `<table class="inst-table">
        <tr><th>日期</th><th>外資買超</th><th>投信買超</th><th>自營商買超</th><th>合計</th></tr>`;
      
      // Filter T86 data to our stock only
      const matching = data.data.filter(r => r[0] && r[0].trim() === code);
      
      // Save institutional trading data for ownership chart
      if (matching.length > 0) {
        const r = matching[0];
        window._instTradingData = {
          foreignBuy: parseInt((r[2]||'').replace(/,/g,'') || 0),
          foreignSell: parseInt((r[3]||'').replace(/,/g,'') || 0),
          trustBuy: parseInt((r[8]||'').replace(/,/g,'') || 0),
          trustSell: parseInt((r[9]||'').replace(/,/g,'') || 0),
          dealerBuy: parseInt((r[12]||'').replace(/,/g,'') || 0) + parseInt((r[15]||'').replace(/,/g,'') || 0),
          dealerSell: parseInt((r[13]||'').replace(/,/g,'') || 0) + parseInt((r[16]||'').replace(/,/g,'') || 0),
        };
      }
      
      for (const row of matching) {
        // T86 real cols: [0=code,1=name,2=foreignBuy,3=foreignSell,4=foreignNet, 8=trustBuy,9=trustSell,10=trustNet, 12=dealerSelfBuy,13=dealerSelfSell,14=dealerSelfNet, 15=dealerHedgeBuy,16=dealerHedgeSell,17=dealerHedgeNet, 18=grandTotal]
        const date = row[1]; // stock name as date label
        const foreignNet = parseInt(row[4]?.replace(/,/g,'') || 0);
        const trustNet = parseInt(row[10]?.replace(/,/g,'') || 0);
        const dealerNet = (parseInt(row[14]?.replace(/,/g,'') || 0) + parseInt(row[17]?.replace(/,/g,'') || 0));
        const totalNet = parseInt(row[18]?.replace(/,/g,'') || 0);
        
        const cls = (v) => v > 0 ? 'positive' : v < 0 ? 'negative' : '';
        html += `<tr>
          <td>${date}</td>
          <td class="num ${cls(foreignNet)}">${foreignNet.toLocaleString()}</td>
          <td class="num ${cls(trustNet)}">${trustNet.toLocaleString()}</td>
          <td class="num ${cls(dealerNet)}">${dealerNet.toLocaleString()}</td>
          <td class="num ${cls(totalNet)}">${totalNet.toLocaleString()}</td>
        </tr>`;
      }
      html += '</table>';
      document.getElementById('instTable').innerHTML = html;
    } else {
      document.getElementById('instTable').innerHTML = '<p style="color:var(--text2)">無本日三大法人買賣超資料</p>';
    }
  } catch(e) {
    document.getElementById('instTable').innerHTML = `<p style="color:var(--text2)">⚠️ 無法取得三大法人資料: ${e.message}</p>`;
  }
  document.getElementById('instLoader').style.display = 'none';
  // Re-render ownership chart with real T86 data
  try { renderOwnership(window.allData, window.allData[window.allData.length-1]); } catch(_) {}
}
