<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>學術論文資料庫 — 王美智</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 導覽列 -->
<nav class="topnav">
  <div class="nav-inner">
    <a href="../index.html" class="nav-brand">🏠 王美智</a>
    <div class="nav-links">
      <a href="../dashboard/">儀表板</a>
      <a href="../stock-viewer/">技術分析</a>
      <a href="../report.html">報告</a>
      <a href="index.html" class="active">📚 論文庫</a>
    </div>
  </div>
</nav>

<!-- Header -->
<header class="hero">
  <div class="hero-inner">
    <h1>📚 學術論文資料庫</h1>
    <p class="subtitle">每日 QVAR 相關文獻搜尋結果 × 論文筆記存放</p>
    <div class="hero-stats">
      <span id="stat-total">—</span> 篇論文
      <span class="sep">·</span>
      <span id="stat-date">—</span> 最後更新
    </div>
  </div>
</header>

<!-- 搜尋與篩選 -->
<main class="container">
  <div class="toolbar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 搜尋標題、作者、關鍵字..." autocomplete="off">
    </div>

    <!-- 主題分類 -->
    <div class="filter-section">
      <div class="filter-label">📂 研究主題</div>
      <div class="filter-tags" id="topicTags"></div>
    </div>

    <!-- 方法分類 -->
    <div class="filter-section">
      <div class="filter-label">🔬 研究方法</div>
      <div class="filter-tags" id="methodTags">
        <button class="tag active" data-tag="all">全部</button>
        <button class="tag" data-tag="QVAR">QVAR</button>
        <button class="tag" data-tag="QARDL">QARDL</button>
        <button class="tag" data-tag="TVP-VAR">TVP-VAR</button>
        <button class="tag" data-tag="WQC">WQC</button>
        <button class="tag" data-tag="QQGC">QQGC</button>
        <button class="tag" data-tag="QTVAR">QTVAR</button>
        <button class="tag" data-tag="upload">📁 上傳</button>
      </div>
    </div>
  </div>

  <!-- 論文列表 -->
  <div id="paperList" class="paper-list"></div>

  <!-- 分頁 -->
  <div class="pagination" id="pagination"></div>
</main>

<!-- 論文詳情 Modal -->
<div id="paperModal" class="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- Footer -->
<footer>
  <p>王美智 · 學術論文資料庫 · 資料來源：OpenAlex / Google Scholar / 自行整理</p>
</footer>

<script src="js/app.js"></script>
</body>
</html>
