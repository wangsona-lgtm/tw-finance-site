<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股收盤速報</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #16213e;
  --accent: #00d4aa;
  --accent2: #0f3460;
  --hover: #252545;
  --red: #ff4757;
  --green: #2ed573;
  --yellow: #ffc312;
  --text: #e0e0e0;
  --text2: #8888aa;
  --text3: #555577;
  --border: #2a2a4a;
  --sidebar-w: 260px;
}
html, body { height:100%; font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }
.wrapper { display:flex; height:100vh; }

/* ═══ Sidebar ═══ */
.sidebar {
  width:var(--sidebar-w); min-width:var(--sidebar-w);
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}
.sidebar-header {
  padding:16px; border-bottom:1px solid var(--border);
}
.sidebar-header h2 { font-size:15px; font-weight:700; color:var(--accent); }
.sidebar-header .sub { font-size:11px; color:var(--text3); margin-top:2px; }
.sidebar-header .nav-link {
  display:inline-block; margin-top:8px; font-size:12px; color:var(--text2);
  text-decoration:none; padding:3px 10px; border:1px solid var(--border);
  border-radius:6px; transition:all .2s;
}
.sidebar-header .nav-link:hover { color:var(--accent); border-color:var(--accent); }
.sidebar-list { flex:1; overflow-y:auto; padding:8px; }

.closing-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:8px;
  cursor:pointer; transition:all .15s;
  border:1px solid transparent; margin-bottom:4px;
}
.closing-item:hover { background:var(--hover); }
.closing-item.active { background:var(--surface2); border-color:var(--accent); }
.closing-item .icon {
  width:32px; height:32px; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; flex-shrink:0; background:rgba(255,71,87,.15); color:var(--red); }
.closing-item .info { flex:1; min-width:0; }
.closing-item .date { font-size:13px; font-weight:500; }
.closing-item .day { font-size:11px; color:var(--text3); margin-left:4px; }
.closing-item .desc { font-size:11px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }

/* ═══ Main Content ═══ */
.content { flex:1; overflow-y:auto; }
.content-inner { max-width: 860px; margin:0 auto; padding:32px 24px 80px; }

/* ═══ Index Card ═══ */
.index-card {
  background:linear-gradient(135deg,var(--surface2),var(--surface));
  border:1px solid var(--border); border-radius:16px;
  padding:28px; margin-bottom:24px;
}
.index-card .label { font-size:12px; color:var(--text3); margin-bottom:4px; letter-spacing:1px; }
.index-card .price { font-size:48px; font-weight:700; letter-spacing:-1px; }
.index-card .price.down { color:var(--red); }
.index-card .price.up { color:var(--green); }
.index-card .change { font-size:18px; margin-top:4px; }
.index-card .details {
  display:flex; gap:24px; margin-top:20px; flex-wrap:wrap;
  border-top:1px solid var(--border); padding-top:16px;
}
.index-card .detail-item { text-align:center; }
.index-card .detail-item .val { font-size:16px; font-weight:500; }
.index-card .detail-item .lbl { font-size:11px; color:var(--text3); margin-top:2px; }
.index-card .feature {
  margin-top:16px; padding:12px 16px;
  background:rgba(255,71,87,.08); border-left:3px solid var(--red);
  border-radius:6px; font-size:13px; color:var(--text2);
}
.index-card .feature.up { background:rgba(46,213,115,.08); border-left-color:var(--green); }

/* ═══ Stocks Table ═══ */
.section-title { font-size:14px; font-weight:500; color:var(--text2); margin:28px 0 12px; letter-spacing:1px; }
.stocks-table { width:100%; border-collapse:collapse; border-radius:12px; overflow:hidden; }
.stocks-table th {
  text-align:left; padding:10px 14px; font-size:11px; font-weight:500;
  color:var(--text3); background:var(--surface); border-bottom:1px solid var(--border);
  letter-spacing:1px;
}
.stocks-table td {
  padding:12px 14px; font-size:14px; border-bottom:1px solid var(--border);
}
.stocks-table tr:last-child td { border-bottom:none; }
.stocks-table tr:hover td { background:var(--hover); }
.stocks-table .code { color:var(--text3); font-size:12px; }
.stocks-table .name { font-weight:500; }
.stocks-table .price { font-weight:700; }
.stocks-table .down { color:var(--red); }
.stocks-table .up { color:var(--green); }
.stocks-table .change-bar {
  display:inline-block; height:4px; border-radius:2px; margin-left:8px;
}
.stocks-table .change-bar.down { background:var(--red); }
.stocks-table .change-bar.up { background:var(--green); }
.stocks-table .change-cell { display:flex; align-items:center; gap:4px; }

/* ═══ FX Card ═══ */
.fx-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:20px; margin-top:12px;
}
.fx-card .fx-row { display:flex; align-items:center; gap:24px; }
.fx-card .fx-pair { font-size:12px; color:var(--text3); letter-spacing:1px; }
.fx-card .fx-rate { font-size:28px; font-weight:700; }
.fx-card .fx-change { font-size:14px; }
.fx-card .fx-change.dep { color:var(--red); }
.fx-card .fx-change.app { color:var(--green); }

/* ═══ Status Badge ═══ */
.status-badge {
  display:inline-block; padding:2px 10px; border-radius:12px;
  font-size:11px; font-weight:500; margin-left:8px;
  background:rgba(46,213,115,.15); color:var(--green);
}

/* ═══ Utility ═══ */
.text-red { color:var(--red); }
.text-green { color:var(--green); }
</style>
</head>
<body>

<div class="wrapper">

  <!-- ═══ Sidebar ═══ -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <div>
        <h2>📊 收盤速報</h2>
        <div class="sub">結構化收盤數據</div>
        <a class="nav-link" href="dashboard/">📈 儀表板</a>
        <a class="nav-link" href="daily-reports.html">📋 日報</a>
      </div>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </nav>

  <!-- ═══ Content ═══ -->
  <main class="content">
    <div class="content-inner" id="mainContent">
      <div style="text-align:center;padding:80px 20px;color:var(--text3);">
        <div style="font-size:48px;margin-bottom:16px;">📊</div>
        <div style="font-size:16px;">選擇日期查看收盤數據</div>
      </div>
    </div>
  </main>

</div>

<script>
const CLOSING_PREFIX = 'closing/';

// ═══ Load closing list ═══
async function loadClosingList() {
  const res = await fetch(CLOSING_PREFIX + 'list.json');
  return await res.json();
}

// ═══ Load single closing ═══
async function loadClosing(date) {
  const res = await fetch(CLOSING_PREFIX + date + '.json');
  return await res.json();
}

// ═══ Render sidebar ═══
function renderSidebar(list, activeDate) {
  const el = document.getElementById('sidebarList');
  el.innerHTML = list.map(item => {
    const isActive = item.date === activeDate;
    return `<div class="closing-item${isActive ? ' active' : ''}" onclick="selectDate('${item.date}')">
      <div class="icon">📉</div>
      <div class="info">
        <div class="date">${item.date} <span class="day">週${item.dayOfWeek}</span></div>
        <div class="desc">${item.title || ''}</div>
      </div>
    </div>`;
  }).join('');
}

// ═══ Select date ═══
async function selectDate(date) {
  window.location.hash = date;
  const data = await loadClosing(date);
  const list = await loadClosingList();
  renderSidebar(list, date);
  renderClosing(data);
}

// ═══ Render closing data ═══
function renderClosing(data) {
  const el = document.getElementById('mainContent');
  const idx = data.index;
  const isDown = idx.change < 0;
  const changePct = idx.changePercent > 0 ? '+' + idx.changePercent : idx.changePercent;
  const chgSign = idx.change > 0 ? '+' : '';
  const intraPct = idx.intradayDrop ? (idx.intradayDrop > 0 ? '🔴 日內跌 ' + idx.intradayDrop + '%' : '🟢 日內漲 ' + Math.abs(idx.intradayDrop) + '%') : '';

  // Status
  const statusBadge = data.marketStatus === 'closed'
    ? '<span class="status-badge">已收盤</span>'
    : '<span class="status-badge" style="background:rgba(255,199,18,.15);color:var(--yellow);">盤中</span>';

  // Index card
  let html = `<div class="index-card">
    <div class="label">${idx.name} ${statusBadge}</div>
    <div class="price ${isDown ? 'down' : 'up'}">${idx.close.toLocaleString()}</div>
    <div class="change ${isDown ? 'down' : 'up'}">${chgSign}${idx.change.toLocaleString()} (${changePct}%)</div>
    <div class="details">
      <div class="detail-item"><div class="val">${idx.open.toLocaleString()}</div><div class="lbl">開盤</div></div>
      <div class="detail-item"><div class="val text-red">${idx.high.toLocaleString()}</div><div class="lbl">最高</div></div>
      <div class="detail-item"><div class="val text-green">${idx.low.toLocaleString()}</div><div class="lbl">最低</div></div>
      <div class="detail-item"><div class="val">${idx.prevClose.toLocaleString()}</div><div class="lbl">昨收</div></div>
    </div>
    ${idx.feature ? `<div class="feature">💡 ${idx.feature}</div>` : ''}
  </div>`;

  // Stocks table
  if (data.stocks && data.stocks.length > 0) {
    html += `<div class="section-title">📌 權值股收盤</div>
    <table class="stocks-table">
      <thead><tr>
        <th>代號</th><th>名稱</th><th style="text-align:right;">收盤</th><th style="text-align:right;">漲跌</th><th style="text-align:right;">漲跌幅</th><th></th>
      </tr></thead><tbody>`;
    data.stocks.forEach(s => {
      const sDown = s.change < 0;
      const sSign = s.change > 0 ? '+' : '';
      const barPct = Math.min(Math.abs(s.changePercent) / 10 * 100, 100);
      html += `<tr>
        <td class="code">${s.code}</td>
        <td class="name">${s.name}</td>
        <td class="price ${sDown ? 'down' : 'up'}" style="text-align:right;">${typeof s.close === 'number' ? s.close.toLocaleString() : s.close}</td>
        <td class="${sDown ? 'down' : 'up'}" style="text-align:right;">${sSign}${s.change.toLocaleString()}</td>
        <td style="text-align:right;">
          <span class="change-cell">
            ${sDown ? '🔴' : '🟢'} ${s.changePercent > 0 ? '+' : ''}${s.changePercent}%
            <span class="change-bar ${sDown ? 'down' : 'up'}" style="width:${barPct}px;"></span>
          </span>
        </td>
        <td></td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  // FX
  if (data.fx) {
    const fx = data.fx;
    const fxDep = fx.direction && fx.direction.includes('貶');
    html += `<div class="section-title">💱 匯率</div>
    <div class="fx-card">
      <div class="fx-row">
        <div class="fx-pair">${fx.pair}</div>
        <div class="fx-rate ${fxDep ? 'text-red' : 'text-green'}">${fx.rate}</div>
        <div class="fx-change ${fxDep ? 'dep' : 'app'}">${fx.change > 0 ? '+' : ''}${fx.change} (${fx.changePercent > 0 ? '+' : ''}${fx.changePercent}%)</div>
        <div style="font-size:13px;color:var(--text3);">${fx.direction || ''}</div>
      </div>
    </div>`;
  }

  el.innerHTML = html;
}

// ═══ Init ═══
(async function() {
  try {
    const list = await loadClosingList();
    renderSidebar(list, null);
    const hash = window.location.hash.replace('#','');
    if (hash) {
      selectDate(hash);
    } else if (list.length > 0) {
      selectDate(list[0].date);
    }
  } catch(e) {
    document.getElementById('mainContent').innerHTML =
      `<div style="color:var(--red);padding:40px;text-align:center;">⚠️ ${e.message}</div>`;
  }
})();
</script>

</body>
</html>
