<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技術分析圖表 | 王美智</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans TC',sans-serif; background:#f5f0e8; color:#1a1714; }
.header {
  background:#fff; border-bottom:2px solid #d4c9b8;
  padding:16px 24px; display:flex; justify-content:space-between; align-items:center;
}
.header h1 { font-size:18px; color:#1B365D; }
.header a { color:#6b5f55; text-decoration:none; font-size:13px; }
.container { max-width:1000px; margin:0 auto; padding:24px 16px; }
.date-badge {
  display:inline-block; background:#1B365D; color:#fff; padding:6px 16px;
  border-radius:8px; font-size:14px; font-weight:600; margin-bottom:20px;
}
.chart-grid { display:grid; grid-template-columns:1fr; gap:24px; }
.chart-card {
  background:#fff; border:2px solid #d4c9b8; border-radius:12px; overflow:hidden;
}
.chart-card img { width:100%; display:block; }
.chart-card .info { padding:14px 18px; }
.chart-card .info h3 { font-size:16px; color:#1B365D; }
.chart-card .info p { font-size:13px; color:#6b5f55; margin-top:4px; }
.footer { text-align:center; padding:24px; font-size:12px; color:#6b5f55; }
@media(min-width:720px) {
  .chart-grid { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>
<div class="header">
  <h1>📊 技術分析圖表</h1>
  <a href="../">← 回首頁</a>
</div>
<div class="container">
  <div class="date-badge">📅 2026/06/12 收盤</div>
  <div class="chart-grid">
    <div class="chart-card">
      <img src="dji.png" alt="道瓊工業指數">
      <div class="info"><h3>道瓊工業指數 DJI</h3><p>50,848.75 (+1.86%) · RSI 55.1</p></div>
    </div>
    <div class="chart-card">
      <img src="sox.png" alt="費城半導體指數">
      <div class="info"><h3>費城半導體指數 SOX</h3><p>13,171.44 (+7.91%) · RSI 59.5</p></div>
    </div>
    <div class="chart-card">
      <img src="ixic.png" alt="納斯達克指數">
      <div class="info"><h3>納斯達克指數 IXIC</h3><p>25,809.66 (+2.54%) · RSI 43.6</p></div>
    </div>
    <div class="chart-card">
      <img src="tsm.png" alt="台積電 ADR">
      <div class="info"><h3>台積電 ADR (TSM)</h3><p>$421.07 (+3.01%) · RSI 54.6</p></div>
    </div>
    <div class="chart-card">
      <img src="intc.png" alt="Intel">
      <div class="info"><h3>Intel (INTC)</h3><p>$116.96 (+9.27%) · RSI 48.8</p></div>
    </div>
  </div>
</div>
<div class="footer">國立臺中科技大學 王美智 · 技術分析圖每日更新</div>
</body>
</html>
