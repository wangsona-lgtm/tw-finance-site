<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股盤後分析報告</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #16213e;
  --accent: #00d4aa;
  --accent2: #0f3460;
  --hover: #252545;
  --red: #ff4757;
  --green: #2ed573;
  --yellow: #ffc312;
  --text: #e0e0e0;
  --text2: #8888aa;
  --text3: #555577;
  --border: #2a2a4a;
  --sidebar-w: 280px;
}
html, body { height:100%; font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }

/* ═══ Layout ═══ */
.wrapper { display:flex; height:100vh; }

/* ═══ Sidebar ═══ */
.sidebar {
  width:var(--sidebar-w); min-width:var(--sidebar-w);
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}
.sidebar-header {
  padding:16px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.sidebar-header h2 { font-size:15px; font-weight:700; color:var(--accent); }
.sidebar-header a {
  color:var(--text2); text-decoration:none; font-size:13px;
  padding:4px 10px; border:1px solid var(--border); border-radius:6px;
  transition:all .2s;
}
.sidebar-header a:hover { color:var(--accent); border-color:var(--accent); }

.sidebar-list { flex:1; overflow-y:auto; padding:8px; }

.report-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:8px;
  cursor:pointer; transition:all .15s;
  border:1px solid transparent; margin-bottom:4px;
}
.report-item:hover { background:var(--hover); }
.report-item.active {
  background:var(--surface2); border-color:var(--accent);
}
.report-item .icon {
  width:32px; height:32px; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; flex-shrink:0;
}
.report-item .icon.new { background:rgba(0,212,170,.15); }
.report-item .icon.old { background:rgba(136,136,170,.1); }
.report-item .info { flex:1; min-width:0; }
.report-item .date { font-size:13px; font-weight:500; }
.report-item .day { font-size:11px; color:var(--text3); margin-left:4px; }
.report-item .desc { font-size:11px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.report-item .badge {
  font-size:10px; padding:2px 6px; border-radius:4px;
  background:var(--accent); color:#000; font-weight:700;
}

/* ═══ Main Content ═══ */
.content {
  flex:1; overflow-y:auto; padding:0;
}
.content-inner { max-width:900px; margin:0 auto; padding:32px 40px; }

/* ═══ Report Styling ═══ */
.section { margin-bottom:32px; }
.section-title {
  font-size:18px; font-weight:700; margin-bottom:16px;
  padding-bottom:8px; border-bottom:2px solid var(--accent);
  display:flex; align-items:center; gap:8px;
}

.market-card {
  background: linear-gradient(135deg, var(--surface), var(--surface2));
  border:1px solid var(--border); border-radius:12px; padding:20px;
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:16px;
}
.market-item { text-align:center; }
.market-item .label { font-size:12px; color:var(--text2); }
.market-item .value { font-size:24px; font-weight:700; margin-top:4px; }
.market-item .value.green { color:var(--green); }
.market-item .value.red { color:var(--red); }
.market-item .sub { font-size:12px; color:var(--text2); margin-top:2px; }

.market-summary {
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:14px 18px; font-size:14px; line-height:1.6;
  color:var(--text); border-left:3px solid var(--accent);
}

/* Stock card */
.stock-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; margin-bottom:12px; overflow:hidden;
}
.stock-card .header {
  padding:12px 16px; display:flex; align-items:center; gap:12px;
  cursor:pointer; user-select:none;
}
.stock-card .header .code { font-weight:700; font-size:14px; }
.stock-card .header .name { font-size:14px; }
.stock-card .header .price { margin-left:auto; text-align:right; }
.stock-card .header .price .val { font-size:16px; font-weight:700; }
.stock-card .header .price .chg { font-size:12px; }
.stock-card .hit { border-left:3px solid var(--green); }
.stock-card .miss { border-left:3px solid var(--red); }
.stock-card .body { padding:0 16px 16px; display:none; }
.stock-card.open .body { display:block; }

.stock-detail { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:8px 0; }
.stock-detail .item {
  background:var(--bg); border-radius:6px; padding:8px 12px;
  font-size:13px;
}
.stock-detail .item .q { color:var(--text2); font-size:11px; }
.stock-detail .item .a { font-weight:500; margin-top:2px; }

.review-box {
  background:rgba(255,197,18,.08); border:1px solid rgba(255,197,18,.2);
  border-radius:8px; padding:12px 14px; font-size:13px; line-height:1.6;
  margin-top:8px; border-left:3px solid var(--yellow);
}

/* Momentum */
.industry-section { margin-bottom:20px; }
.industry-title {
  font-size:15px; font-weight:600; margin-bottom:8px;
  display:flex; align-items:center; gap:8px;
}
.industry-title .count {
  font-size:12px; background:var(--accent); color:#000;
  padding:2px 8px; border-radius:4px; font-weight:700;
}
.industry-title .streak { font-size:12px; color:var(--text2); font-weight:400; }

.stock-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:8px;
}
.stock-chip {
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:10px 14px; display:flex;
  justify-content:space-between; align-items:center;
  transition:transform .15s;
}
.stock-chip:hover { transform:translateY(-1px); border-color:var(--accent); }
.stock-chip .scode { font-size:12px; color:var(--text2); }
.stock-chip .sname { font-size:13px; font-weight:500; }
.stock-chip .sclose { font-size:13px; font-weight:700; color:var(--green); }
.stock-chip .sstreak { font-size:11px; color:var(--yellow); }

.summary-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:16px; display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px;
}
.summary-card .item { text-align:center; }
.summary-card .item .label { font-size:11px; color:var(--text2); }
.summary-card .item .value { font-size:20px; font-weight:700; margin-top:4px; }

.watch-box {
  background:rgba(0,212,170,.08); border:1px solid rgba(0,212,170,.2);
  border-radius:8px; padding:14px; font-size:13px; line-height:1.6;
  border-left:3px solid var(--accent); margin-top:12px;
}

/* Empty state */
.empty-state {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100%; color:var(--text3); text-align:center; padding:40px;
}
.empty-state .big-icon { font-size:48px; margin-bottom:16px; }
.empty-state h3 { font-size:18px; margin-bottom:8px; color:var(--text2); }
.empty-state p { font-size:13px; line-height:1.6; }

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--text3); }

@media(max-width:768px) {
  .sidebar { width:100%; min-width:100%; height:auto; max-height:200px; }
  .wrapper { flex-direction:column; }
  .content-inner { padding:16px; }
  .market-card { grid-template-columns:1fr; }
  .stock-detail { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div class="wrapper">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>📁 盤後報告</h2>
      <a href="index.html">🏠 回首頁</a>
    </div>
    <div class="sidebar-list" id="reportList">
      <div class="loading" style="text-align:center;padding:40px;color:var(--text2);font-size:13px;">載入中...</div>
    </div>
  </div>

  <!-- Content -->
  <div class="content" id="reportContent">
    <div class="empty-state" id="emptyState">
      <div class="big-icon">📊</div>
      <h3>選取一份報告</h3>
      <p>左側列表選擇日期，即可檢視<br>完整的台股盤後分析報告</p>
    </div>
    <div class="content-inner" id="reportInner" style="display:none;"></div>
  </div>
</div>

<script>
// ═══ Data ═══
let reports = [];

// ═══ Load report list ═══
async function loadReportList() {
  try {
    const r = await fetch('reports/list.json' + '?t=' + Date.now());
    reports = await r.json();
    renderSidebar();
    // Auto-select newest
    if (reports.length > 0) selectReport(reports[0].date);
  } catch(e) {
    document.getElementById('reportList').innerHTML = 
      `<div style="text-align:center;padding:40px;color:var(--red);font-size:13px;">⚠️ ${e.message}</div>`;
  }
}

function renderSidebar() {
  document.getElementById('reportList').innerHTML = reports.map(r => `
    <div class="report-item" data-date="${r.date}" onclick="selectReport('${r.date}')">
      <div class="icon ${r.date === reports[0].date ? 'new' : 'old'}">📄</div>
      <div class="info">
        <div class="date">${r.date} <span class="day">週${r.dayOfWeek}</span></div>
        <div class="desc">${r.title}</div>
      </div>
      ${r.date === reports[0].date ? '<span class="badge">最新</span>' : ''}
    </div>
  `).join('');
}

// ═══ Select & render ═══
async function selectReport(date) {
  // Highlight active
  document.querySelectorAll('.report-item').forEach(el => el.classList.remove('active'));
  const item = document.querySelector(`.report-item[data-date="${date}"]`);
  if (item) item.classList.add('active');

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('reportInner').style.display = 'block';

  try {
    const r = await fetch(`reports/${date}.json` + '?t=' + Date.now());
    const data = await r.json();
    renderReport(data);
  } catch(e) {
    document.getElementById('reportInner').innerHTML = 
      `<div style="color:var(--red);padding:40px;text-align:center;">⚠️ ${e.message}</div>`;
  }
}

// ═══ Render full report ═══
function renderReport(data) {
  const { market, recommendations, momentum } = data;
  let html = '';

  // === 大盤概況 ===
  html += `<div class="section">
    <div class="section-title">🟢 大盤概況：${market.direction}</div>
    <div class="market-card">
      <div class="market-item">
        <div class="label">加權指數</div>
        <div class="value ${market.change.startsWith('+')?'green':'red'}">${market.index}</div>
      </div>
      <div class="market-item">
        <div class="label">漲跌點</div>
        <div class="value ${market.change.startsWith('+')?'green':'red'}">${market.change} (${market.changePct})</div>
      </div>
      <div class="market-item">
        <div class="label">昨日收盤</div>
        <div class="value red">${market.prevClose}</div>
        <div class="sub">${market.prevChange}</div>
      </div>
    </div>
    <div class="market-summary">${market.summary}</div>
  </div>`;

  // === 推薦檢討 ===
  html += `<div class="section">
    <div class="section-title">📋 第一部分：今日推薦檢討</div>`;

  recommendations.stocks.forEach(s => {
    const isHit = s.result === '✅';
    html += `<div class="stock-card ${isHit?'hit':'miss'}">
      <div class="header" onclick="this.parentElement.classList.toggle('open')">
        <span class="result">${s.result}</span>
        <span class="code">${s.code}</span>
        <span class="name">${s.name}</span>
        <div class="price">
          <div class="val ${s.changePct.startsWith('+')?'green':'red'}">${s.close}</div>
          <div class="chg ${s.changePct.startsWith('+')?'green':'red'}">${s.changePct}</div>
        </div>
        <span style="font-size:16px;color:var(--text2);">▾</span>
      </div>
      <div class="body">
        <div class="stock-detail">
          ${s.analysis.map(a => `<div class="item"><div class="q">${a.q}</div><div class="a">${a.a}</div></div>`).join('')}
        </div>
        <div class="review-box">💡 檢討：${s.review}</div>
      </div>
    </div>`;
  });

  // Summary
  html += `<div class="summary-card" style="margin-top:16px;">
    <div class="item"><div class="label">推薦檔數</div><div class="value">${recommendations.total}</div></div>
    <div class="item"><div class="label">✅ 命中</div><div class="value" style="color:var(--green);">${recommendations.hits}</div></div>
    <div class="item"><div class="label">❌ 失誤</div><div class="value" style="color:var(--red);">${recommendations.misses}</div></div>
    <div class="item"><div class="label">命中率</div><div class="value">${recommendations.hitRate}</div></div>
    <div class="item"><div class="label">平均報酬</div><div class="value" style="color:var(--green);">${recommendations.avgReturn}</div></div>
  </div>`;

  html += `</div>`;

  // === 盤面動能 ===
  html += `<div class="section">
    <div class="section-title">🔥 第二部分：今日盤面動能掃描</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:16px;">漲停排行榜（掃描223檔｜今日漲停${momentum.totalLimitUp}檔）</div>`;

  momentum.industries.forEach(ind => {
    html += `<div class="industry-section">
      <div class="industry-title">
        <span>🔥 ${ind.name}</span>
        <span class="count">${ind.count}</span>
        <span class="streak">最長連續：${ind.streak}</span>
      </div>
      <div class="stock-grid">
        ${ind.stocks.map(s => `
          <div class="stock-chip">
            <div>
              <div class="scode">${s.code}</div>
              <div class="sname">${s.name}</div>
            </div>
            <div>
              <div class="sclose">${s.close}</div>
              <div class="sstreak">${s.streak}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
  });

  html += `<div class="watch-box">
    <strong>🔮 明天觀察重點：</strong> ${momentum.watchTomorrow}
  </div>`;

  if (momentum.note) {
    html += `<div style="margin-top:8px;font-size:12px;color:var(--text3);">🧹 ${momentum.note}</div>`;
  }

  html += `</div>`;

  document.getElementById('reportInner').innerHTML = html;
}

loadReportList();
</script>
</body>
</html>
