<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盤前行情 · 專家講評</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #f5f0e8;
  --surface: #ffffff;
  --surface2: #fafaf5;
  --text: #1a1714;
  --text2: #6b5f55;
  --text3: #a09888;
  --accent: #1B365D;
  --accent2: #8B0000;
  --border: #d4c9b8;
  --hover: #f0ebe3;
  --sidebar-w: 260px;
}
html, body { height:100%; font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }
.wrapper { display:flex; height:100vh; }

/* ═══ Top Nav ═══ */
.topnav {
  background:var(--surface); border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100;
}
.nav-inner {
  max-width:1200px; margin:0 auto;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; height:48px;
}
.nav-brand { font-weight:700; color:var(--accent); text-decoration:none; font-size:14px; }
.nav-links { display:flex; gap:4px; }
.nav-links a {
  padding:5px 12px; border-radius:6px; font-size:13px;
  color:var(--text2); text-decoration:none; transition:.15s;
}
.nav-links a:hover { background:var(--hover); color:var(--text); }
.nav-links a.active { background:rgba(27,54,93,.1); color:var(--accent); font-weight:600; }

/* ═══ Sidebar ═══ */
.sidebar {
  width:var(--sidebar-w); min-width:var(--sidebar-w);
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}
.sidebar-header { padding:16px; border-bottom:1px solid var(--border); }
.sidebar-header h2 { font-size:15px; font-weight:700; color:var(--accent); }
.sidebar-header .sub { font-size:11px; color:var(--text3); margin-top:2px; }
.sidebar-list { flex:1; overflow-y:auto; padding:8px; }

.expert-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:8px;
  cursor:pointer; transition:all .15s;
  border:1px solid transparent; margin-bottom:4px;
}
.expert-item:hover { background:var(--hover); }
.expert-item.active { background:var(--surface2); border-color:var(--accent); }
.expert-item .icon {
  width:32px; height:32px; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; flex-shrink:0; background:rgba(27,54,93,.08); color:var(--accent); }
.expert-item .info { flex:1; min-width:0; }
.expert-item .date { font-size:13px; font-weight:500; }
.expert-item .day { font-size:11px; color:var(--text3); margin-left:4px; }
.expert-item .desc { font-size:11px; color:var(--text2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:2px; }

/* ═══ Main Content ═══ */
.content { flex:1; overflow-y:auto; }
.content-inner { max-width:780px; margin:0 auto; padding:24px 24px 80px; }

.expert-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:24px; margin-bottom:16px;
}
.expert-card .header {
  display:flex; align-items:center; gap:10px; margin-bottom:16px;
  padding-bottom:12px; border-bottom:1px solid var(--border);
}
.expert-card .header .icon { font-size:24px; }
.expert-card .header .info h3 { font-size:16px; font-weight:600; color:var(--accent); }
.expert-card .header .info span { font-size:12px; color:var(--text3); }
.expert-card .section { margin-bottom:16px; }
.expert-card .section h4 { font-size:14px; font-weight:600; color:var(--accent2); margin-bottom:6px; }
.expert-card .section p { font-size:14px; line-height:1.7; }
.expert-card .highlight { background:rgba(139,0,0,.03); border-left:3px solid var(--accent2); padding:10px 14px; margin:8px 0; border-radius:0 6px 6px 0; }
.expert-card .tag {
  display:inline-block; padding:2px 10px; border-radius:12px; font-size:12px;
  background:rgba(27,54,93,.08); color:var(--accent); margin-right:4px; margin-top:4px;
}

.empty-state { text-align:center; padding:80px 20px; color:var(--text3); }
.empty-state .icon { font-size:48px; margin-bottom:12px; }

/* Responsive */
@media(max-width:700px) {
  .sidebar { display:none; }
  .nav-links a { font-size:11px; padding:4px 8px; }
}
</style>
</head>
<body>

<!-- 導覽列 -->
<nav class="topnav">
  <div class="nav-inner">
    <a href="../index.html" class="nav-brand">🏠 王美智</a>
    <div class="nav-links">
      <a href="../dashboard/">📊 儀表板</a>
      <a href="../stock-viewer/">🔬 個股分析</a>
      <a href="index.html" class="active">🎙️ 盤前行情</a>
      <a href="../closing-viewer/">📉 收盤行情</a>
      <a href="../papers/">📚 論文庫</a>
    </div>
  </div>
</nav>

<div class="wrapper">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>🎙️ 盤前行情</h2>
      <div class="sub">專家講評</div>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="content-inner" id="contentArea">
      <div class="empty-state">
        <div class="icon">🎙️</div>
        <p>無盤前講評資料</p>
      </div>
    </div>
  </div>
</div>

<script>
const DATA_URL = '../expert/list.json';

async function init() {
  try {
    const res = await fetch(DATA_URL + '?_=' + Date.now());
    const list = await res.json();
    renderSidebar(list);
    if (list.length > 0) loadItem(list[0]);
  } catch(e) {
    document.getElementById('sidebarList').innerHTML = '<div style="padding:12px;color:#a09888;font-size:13px;">⚠️ 載入失敗</div>';
  }
}

function renderSidebar(list) {
  const el = document.getElementById('sidebarList');
  const days = ['日','一','二','三','四','五','六'];
  el.innerHTML = list.map(item => {
    const d = new Date(item.date);
    const day = days[d.getDay()];
    return `<div class="expert-item" onclick="loadItem(${JSON.stringify(item).replace(/"/g,"'")})">
      <div class="icon">🎙️</div>
      <div class="info">
        <div class="date">${item.date} <span class="day">週${day}</span></div>
        <div class="desc">${item.title || '盤前專家講評'}</div>
      </div>
    </div>`;
  }).join('');
}

async function loadItem(item) {
  try {
    const res = await fetch(`../expert/${item.date}.json?_=${Date.now()}`);
    const data = await res.json();
    renderContent(data);
  } catch(e) {
    document.getElementById('contentArea').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>載入失敗</p></div>';
  }
}

function renderContent(data) {
  const html = `
    <div class="expert-card">
      <div class="header">
        <div class="icon">🎙️</div>
        <div class="info">
          <h3>${data.title || '盤前專家講評'}</h3>
          <span>📅 ${data.date || ''}</span>
        </div>
      </div>
      ${(data.sections || []).map(s => {
        if (s.type === 'content') {
          return `<div class="section"><h4>${s.title || ''}</h4><p>${s.content || s.text || ''}</p></div>`;
        }
        if (s.type === 'highlight') {
          return `<div class="highlight"><p>${s.content || s.text || ''}</p></div>`;
        }
        return '';
      }).join('')}
      ${data.content ? `<div class="section"><p>${data.content}</p></div>` : ''}
    </div>
  `;
  document.getElementById('contentArea').innerHTML = html;
}

init();
</script>
</body>
</html>
