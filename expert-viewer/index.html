<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盤前專家講評</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #16213e;
  --accent: #ffc312;
  --accent2: #0f3460;
  --hover: #252545;
  --red: #ff4757;
  --green: #2ed573;
  --yellow: #ffc312;
  --text: #e0e0e0;
  --text2: #8888aa;
  --text3: #555577;
  --border: #2a2a4a;
  --sidebar-w: 260px;
}
html, body { height:100%; font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }
.wrapper { display:flex; height:100vh; }

/* ═══ Sidebar ═══ */
.sidebar {
  width:var(--sidebar-w); min-width:var(--sidebar-w);
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}
.sidebar-header {
  padding:16px; border-bottom:1px solid var(--border);
}
.sidebar-header h2 { font-size:15px; font-weight:700; color:var(--accent); }
.sidebar-header .sub { font-size:11px; color:var(--text3); margin-top:2px; }
.sidebar-header .nav-link {
  display:inline-block; margin-top:8px; font-size:12px; color:var(--text2);
  text-decoration:none; padding:3px 10px; border:1px solid var(--border);
  border-radius:6px; transition:all .2s;
}
.sidebar-header .nav-link:hover { color:var(--accent); border-color:var(--accent); }
.sidebar-list { flex:1; overflow-y:auto; padding:8px; }

.expert-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:8px;
  cursor:pointer; transition:all .15s;
  border:1px solid transparent; margin-bottom:4px;
}
.expert-item:hover { background:var(--hover); }
.expert-item.active { background:var(--surface2); border-color:var(--accent); }
.expert-item .icon {
  width:32px; height:32px; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; flex-shrink:0; background:rgba(255,195,18,.15); color:var(--yellow); }
.expert-item .info { flex:1; min-width:0; }
.expert-item .date { font-size:13px; font-weight:500; }
.expert-item .day { font-size:11px; color:var(--text3); margin-left:4px; }
.expert-item .desc { font-size:11px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }

/* ═══ Main Content ═══ */
.content { flex:1; overflow-y:auto; }
.content-inner { max-width: 780px; margin:0 auto; padding:32px 24px 80px; }

/* ═══ Expert Commentary Card ═══ */
.expert-card {
  background:linear-gradient(135deg,rgba(255,195,18,.05),var(--surface));
  border:1px solid var(--border); border-radius:16px;
  padding:28px; margin-bottom:20px;
}
.expert-card .expert-label {
  font-size:11px; color:var(--accent); letter-spacing:2px;
  margin-bottom:12px; text-transform:uppercase;
}
.expert-card .expert-title { font-size:20px; font-weight:700; margin-bottom:16px; }
.expert-card .expert-content {
  font-size:14px; line-height:1.9; color:var(--text);
}
.expert-card .expert-content p { margin-bottom:12px; }
.expert-card .expert-highlight {
  background:rgba(255,195,18,.08);
  border-left:3px solid var(--accent);
  padding:12px 16px; margin:12px 0; border-radius:0 6px 6px 0;
  font-size:13px;
}

/* ═══ Empty State ═══ */
.empty-state { text-align:center; padding:80px 20px; color:var(--text3); }
.empty-state .icon { font-size:48px; margin-bottom:16px; }
.empty-state .text { font-size:16px; }

/* ═══ Utility ═══ */
.text-red { color:var(--red); }
.text-green { color:var(--green); }
.text-yellow { color:var(--yellow); }
</style>
</head>
<body>

<div class="wrapper">

  <!-- ═══ Sidebar ═══ -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <div>
        <h2>🎙️ 盤前專家講評</h2>
        <div class="sub">每日專家觀點</div>
        <a class="nav-link" href="../dashboard/">📊 儀表板</a>
        <a class="nav-link" href="../daily-reports.html">📋 晨報</a>
        <a class="nav-link" href="../postmarket-viewer/">🔍 盤後</a>
        <a class="nav-link" href="../closing-viewer/">📉 收盤</a>
      </div>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </nav>

  <!-- ═══ Content ═══ -->
  <main class="content">
    <div class="content-inner" id="mainContent">
      <div class="empty-state">
        <div class="icon">🎙️</div>
        <div class="text">選擇日期查看專家講評</div>
      </div>
    </div>
  </main>

</div>

<script>
const EXPERT_PREFIX = '../expert/';

async function loadExpertList() {
  const res = await fetch(EXPERT_PREFIX + 'list.json?_t=' + Date.now());
  return await res.json();
}

async function loadExpert(date) {
  const res = await fetch(EXPERT_PREFIX + date + '.json?_t=' + Date.now());
  return await res.json();
}

function renderSidebar(list, activeDate) {
  document.getElementById('sidebarList').innerHTML = list.map(item => {
    const active = item.date === activeDate ? ' active' : '';
    return `<div class="expert-item${active}" onclick="selectExpert('${item.date}')">
      <div class="icon">🎙️</div>
      <div class="info">
        <div class="date">${item.date} <span class="day">週${item.dayOfWeek}</span></div>
        <div class="desc">${item.title || ''}</div>
      </div>
    </div>`;
  }).join('');
}

async function selectExpert(date) {
  window.location.hash = date;
  const data = await loadExpert(date);
  const list = await loadExpertList();
  renderSidebar(list, date);
  renderExpert(data);
}

function renderExpert(data) {
  const el = document.getElementById('mainContent');
  let html = '';

  data.sections.forEach(sec => {
    html += `<div class="expert-card">
      <div class="expert-label">${sec.icon || '🎙️'} 專家觀點</div>
      <div class="expert-title">${sec.title || ''}</div>
      <div class="expert-content">`;

    // Render content with paragraph breaks
    const content = sec.content || '';
    const lines = content.split('\n');
    lines.forEach(line => {
      line = line.trim();
      if (!line) return;
      if (line.startsWith('【') && line.includes('】')) {
        html += `<div class="expert-highlight">${line}</div>`;
      } else {
        html += `<p>${line}</p>`;
      }
    });

    html += `</div></div>`;
  });

  el.innerHTML = html;
}

(async function() {
  try {
    const list = await loadExpertList();
    renderSidebar(list, null);
    const hash = window.location.hash.replace('#','');
    if (hash) {
      await selectExpert(hash);
    } else if (list.length > 0) {
      await selectExpert(list[0].date);
    }
  } catch(e) {
    document.getElementById('mainContent').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div><div class="text">${e.message}</div></div>`;
  }
})();
</script>

</body>
</html>
