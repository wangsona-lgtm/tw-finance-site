<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回測專區 · 王美智</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f0e8;--surface:#fff;--text:#1a1714;--text2:#6b5f55;--accent:#8B0000;--accent2:#006400;--accent3:#1B365D;--border:#d4c9b8}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text)}
.header{background:var(--surface);border-bottom:2px solid var(--border);padding:20px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:900}
.header h1 span{color:var(--accent3)}
.nav{display:flex;gap:8px;flex-wrap:wrap}
.nav a{color:var(--text2);text-decoration:none;font-size:14px;padding:4px 10px;border-radius:6px;transition:all .2s}
.nav a:hover{background:var(--border);color:var(--text)}
.container{max-width:800px;margin:0 auto;padding:24px 16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card h3{font-size:16px;color:var(--accent3);margin-bottom:8px}
.card .meta{font-size:13px;color:var(--text2);margin-bottom:4px}
.card .value{font-size:24px;font-weight:700}
.card .value.up{color:red}
.card .value.down{color:green}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:8px 10px;text-align:right;border-bottom:1px solid var(--border)}
th{background:var(--bg);font-weight:700;color:var(--text2);text-align:right}
td:first-child,th:first-child{text-align:left}
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.section-title{text-align:center;padding:32px 0 20px}
.section-title h2{font-size:24px;font-weight:700;color:var(--accent3)}
.section-title p{color:var(--text2);margin-top:6px;font-size:14px}
.btn{display:inline-block;background:var(--accent3);color:#fff;padding:8px 16px;border-radius:8px;text-decoration:none;font-size:14px;border:none;cursor:pointer}
.btn:hover{opacity:.9}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
@media(max-width:600px){.header{padding:16px}.header h1{font-size:18px}.container{padding:16px 12px}}
</style>
</head>
<body>
<div class="header">
  <h1><a href="../" style="text-decoration:none;color:inherit;">📊 王美智 · <span>回測專區</span></a></h1>
  <div class="nav">
    <a href="../">🏠 首頁</a>
    <a href="../dashboard/">📊 儀表板</a>
    <a href="../premarket/">🖼️ 盤前圖表</a>
    <a href="../closing-viewer/">📉 收盤</a>
    <a href="../postmarket-viewer/">🔍 盤後</a>
  </div>
</div>
<div class="container">
  <div class="section-title">
    <h2>📊 ETF 回測專區</h2>
    <p>0050.TW · 均線交叉策略 · 多訊號回測</p>
  </div>
  <div class="grid" id="backtestGrid"></div>
</div>
<script>
const backtests = [
  { date: '2026-06-11', title: '0050 均線交叉回測', desc: '短均線×長均線交叉策略，多訊號比較（VIX、HIRP、ML）', status: 'pending' }
];
const grid = document.getElementById('backtestGrid');
if (backtests.length === 0) {
  grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>尚無回測記錄</p></div>';
} else {
  backtests.forEach(b => {
    grid.innerHTML += `<div class="card"><h3>${b.title}</h3><div class="meta">${b.date}</div><p style="font-size:13px;color:var(--text2);margin:8px 0;">${b.desc}</p><span style="display:inline-block;padding:4px 10px;border-radius:12px;font-size:12px;background:#e8e0d0;color:var(--text2);">⏳ 待執行</span></div>`;
  });
}
</script>
</body>
</html>
