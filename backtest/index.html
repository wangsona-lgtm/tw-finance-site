<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回測專區 · 王美智</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f0e8;--surface:#fff;--text:#1a1714;--text2:#6b5f55;--accent:#8B0000;--accent2:#006400;--accent3:#1B365D;--border:#d4c9b8}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text)}
.header{background:var(--surface);border-bottom:2px solid var(--border);padding:20px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:900}
.header h1 span{color:var(--accent3)}
.nav{display:flex;gap:8px;flex-wrap:wrap}
.nav a{color:var(--text2);text-decoration:none;font-size:14px;padding:4px 10px;border-radius:6px;transition:all .2s}
.nav a:hover{background:var(--border);color:var(--text)}
.container{max-width:800px;margin:0 auto;padding:24px 16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card h3{font-size:16px;color:var(--accent3);margin-bottom:8px}
.card .meta{font-size:13px;color:var(--text2);margin-bottom:4px}
.card .value{font-size:24px;font-weight:700}
.card .value.green{color:var(--accent2)}
.card .value.red{color:var(--accent)}
.section-title{text-align:center;padding:32px 0 20px}
.section-title h2{font-size:24px;font-weight:700;color:var(--accent3)}
.section-title p{color:var(--text2);margin-top:6px;font-size:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.btn{display:inline-block;background:var(--accent3);color:#fff;padding:10px 20px;border-radius:8px;text-decoration:none;font-size:15px;font-weight:500;text-align:center;transition:all .2s}
.btn:hover{opacity:.9}
@media(max-width:600px){.header{padding:16px}.header h1{font-size:18px}.container{padding:16px 12px}}
</style>
</head>
<body>
<div class="header">
  <h1><a href="../" style="text-decoration:none;color:inherit;">📊 王美智 · <span>回測專區</span></a></h1>
  <div class="nav">
    <a href="../">🏠 首頁</a>
    <a href="../dashboard/">📊 儀表板</a>
    <a href="../premarket/">🖼️ 盤前圖表</a>
    <a href="../closing-viewer/">📉 收盤</a>
    <a href="../postmarket-viewer/">🔍 盤後</a>
  </div>
</div>
<div class="container">
  <div class="section-title">
    <h2>📊 ETF 回測專區</h2>
    <p>0050.TW · RSI 策略 · 均線交叉策略 · 持續更新</p>
  </div>

  <div class="card" style="border-color:var(--accent2);border-width:2px;">
    <h3>📈 0050 RSI 回測（2022-2024）</h3>
    <div class="meta">2026-06-12 產生 ｜ RSI(14) 超賣30/超買70 ｜ 本金 200 萬</div>
    <div class="grid" style="margin:12px 0;">
      <div><div style="font-size:12px;color:var(--text2)">總報酬</div><div class="value green">+7.60%</div></div>
      <div><div style="font-size:12px;color:var(--text2)">年化報酬</div><div class="value green">+2.48%</div></div>
      <div><div style="font-size:12px;color:var(--text2)">Buy & Hold</div><div class="value green">+49.96%</div></div>
      <div><div style="font-size:12px;color:var(--text2)">Sharpe</div><div style="font-size:20px;font-weight:700">-0.11</div></div>
      <div><div style="font-size:12px;color:var(--text2)">最大回撤</div><div class="value red">-28.91%</div></div>
      <div><div style="font-size:12px;color:var(--text2)">勝率</div><div style="font-size:20px;font-weight:700">50%</div></div>
    </div>
    <a href="0050-rsi-backtest.html" class="btn" target="_blank">📄 查看完整報告 →</a>
  </div>

  <div class="card">
    <h3>📋 回測記錄</h3>
    <div style="font-size:13px;color:var(--text2);margin:8px 0;">
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);">
        <span>0050 RSI(30/70) 回測</span>
        <span style="color:var(--accent2);">+7.60% ✅</span>
        <span style="color:var(--text2);">2026-06-12</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
