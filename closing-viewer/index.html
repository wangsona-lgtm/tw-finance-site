<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>收盤行情 · 每日盤後</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #f5f0e8;
  --surface: #ffffff;
  --surface2: #fafaf5;
  --text: #1a1714;
  --text2: #6b5f55;
  --text3: #a09888;
  --accent: #1B365D;
  --accent2: #8B0000;
  --border: #d4c9b8;
  --hover: #f0ebe3;
  --red: #dc2626;
  --green: #16a34a;
  --sidebar-w: 260px;
}
html, body { height:100%; font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }
.wrapper { display:flex; height:100vh; }

/* Top Nav */
.topnav {
  background:var(--surface); border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100;
}
.nav-inner {
  max-width:1200px; margin:0 auto;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; height:48px;
}
.nav-brand { font-weight:700; color:var(--accent); text-decoration:none; font-size:14px; }
.nav-links { display:flex; gap:4px; }
.nav-links a {
  padding:5px 12px; border-radius:6px; font-size:13px;
  color:var(--text2); text-decoration:none; transition:.15s;
}
.nav-links a:hover { background:var(--hover); color:var(--text); }
.nav-links a.active { background:rgba(27,54,93,.1); color:var(--accent); font-weight:600; }

/* Sidebar */
.sidebar {
  width:var(--sidebar-w); min-width:var(--sidebar-w);
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}
.sidebar-header { padding:16px; border-bottom:1px solid var(--border); }
.sidebar-header h2 { font-size:15px; font-weight:700; color:var(--accent); }
.sidebar-header .sub { font-size:11px; color:var(--text3); margin-top:2px; }
.sidebar-list { flex:1; overflow-y:auto; padding:8px; }

.closing-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:8px; cursor:pointer; transition:all .15s;
  border:1px solid transparent; margin-bottom:4px;
}
.closing-item:hover { background:var(--hover); }
.closing-item.active { background:var(--surface2); border-color:var(--accent); }
.closing-item .icon {
  width:32px; height:32px; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; flex-shrink:0; background:rgba(220,38,38,.08); color:var(--red); }
.closing-item .info { flex:1; min-width:0; }
.closing-item .date { font-size:13px; font-weight:500; }
.closing-item .day { font-size:11px; color:var(--text3); margin-left:4px; }

/* Content */
.content { flex:1; overflow-y:auto; }
.content-inner { max-width:800px; margin:0 auto; padding:20px 20px 80px; }

/* Cards */
.card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:16px; }
.card h3 { font-size:15px; font-weight:600; color:var(--accent); margin-bottom:8px; }

.index-row { display:flex; gap:16px; flex-wrap:wrap; }
.index-item { flex:1; min-width:120px; text-align:center; padding:12px; background:var(--surface2); border-radius:8px; }
.index-item .label { font-size:12px; color:var(--text3); }
.index-item .value { font-size:20px; font-weight:700; }
.index-item .value.up { color:var(--red); }
.index-item .value.down { color:var(--green); }
.index-item .change { font-size:12px; }

.stocks-table { width:100%; border-collapse:collapse; font-size:13px; }
.stocks-table th { text-align:left; padding:8px 6px; font-size:12px; color:var(--text3); border-bottom:1px solid var(--border); }
.stocks-table td { padding:6px; border-bottom:1px solid var(--border); }
.stocks-table tr:hover td { background:var(--hover); }
.stocks-table .up { color:var(--red); }
.stocks-table .down { color:var(--green); }

.empty-state { text-align:center; padding:80px 20px; color:var(--text3); }
.empty-state .icon { font-size:48px; margin-bottom:12px; }

@media(max-width:700px) {
  .sidebar { display:none; }
  .nav-links a { font-size:11px; padding:4px 8px; }
}
</style>
</head>
<body>
<nav class="topnav">
  <div class="nav-inner">
    <a href="../index.html" class="nav-brand">🏠 王美智</a>
    <div class="nav-links">
      <a href="../dashboard/">📊 儀表板</a>
      <a href="../stock-viewer/">🔬 個股分析</a>
      <a href="../expert-viewer/">🎙️ 盤前行情</a>
      <a href="index.html" class="active">📉 收盤行情</a>
    </div>
  </div>
</nav>

<div class="wrapper">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>📉 收盤行情</h2>
      <div class="sub">每日盤後個股收盤</div>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </div>

  <div class="content">
    <div class="content-inner" id="contentArea">
      <div class="empty-state"><div class="icon">📉</div><p>無收盤資料</p></div>
    </div>
  </div>
</div>

<script>
const DATA_URL = '../closing/list.json';
async function init() {
  try {
    const res = await fetch(DATA_URL + '?_=' + Date.now());
    const list = await res.json();
    renderSidebar(list);
    if (list.length > 0) loadItem(list[0]);
  } catch(e) {
    document.getElementById('sidebarList').innerHTML = '<div style="padding:12px;color:#a09888;font-size:13px;">⚠️ 載入失敗</div>';
  }
}
function renderSidebar(list) {
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('sidebarList').innerHTML = list.map(item => {
    const d = new Date(item.date);
    return `<div class="closing-item" onclick='loadItem(${JSON.stringify(item)})'>
      <div class="icon">📉</div>
      <div class="info"><div class="date">${item.date} <span class="day">週${days[d.getDay()]}</span></div></div>
    </div>`;
  }).join('');
}
async function loadItem(item) {
  try {
    const res = await fetch(`../closing/${item.date}.json?_=${Date.now()}`);
    const data = await res.json();
    renderContent(data);
  } catch(e) {
    document.getElementById('contentArea').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>載入失敗</p></div>';
  }
}
function renderContent(data) {
  let html = '';
  if (data.index) {
    const idx = data.index;
    const cls = idx.change >= 0 ? 'up' : 'down';
    html += `<div class="card">
      <h3>📊 大盤指數</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;">
        <div><div class="label" style="color:#888;font-size:12px;">收盤</div><div style="font-size:24px;font-weight:700;">${idx.close.toLocaleString()}</div></div>
        <div><div class="label" style="color:#888;font-size:12px;">漲跌</div><div style="font-size:24px;font-weight:700;color:${cls === 'up' ? 'red' : 'green'}">${idx.change.toFixed(2)} (${idx.changePercent.toFixed(2)}%)</div></div>
        <div><div class="label" style="color:#888;font-size:12px;">開盤</div><div>${idx.open.toLocaleString()}</div></div>
        <div><div class="label" style="color:#888;font-size:12px;">最高</div><div>${idx.high.toLocaleString()}</div></div>
        <div><div class="label" style="color:#888;font-size:12px;">最低</div><div>${idx.low.toLocaleString()}</div></div>
        <div><div class="label" style="color:#888;font-size:12px;">特徵</div><div style="font-size:12px;color:#666;">${idx.feature || ''}</div></div>
      </div>
    </div>`;
  }
  if (data.stocks && data.stocks.length > 0) {
    html += `<div class="card"><h3>📋 個股收盤</h3><table class="stocks-table"><thead><tr><th>代碼</th><th>名稱</th><th>收盤</th><th>漲跌</th><th>漲跌幅</th></tr></thead><tbody>`;
    data.stocks.slice(0,30).forEach(s => {
      const cls = parseFloat(s.change) >= 0 ? 'up' : 'down';
      html += `<tr><td>${s.code}</td><td>${s.name}</td><td class="${cls}">${s.close}</td><td class="${cls}">${s.change}</td><td class="${cls}">${s.changePercent}%</td></tr>`;
    });
    html += `</tbody></table></div>`;
  }
  document.getElementById('contentArea').innerHTML = html || '<div class="empty-state"><div class="icon">📭</div><p>無資料</p></div>';
}
init();
</script>
</body>
</html>
